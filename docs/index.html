<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MonoFly — raw demo</title>

    <!-- The bundle externalizes React, so the browser needs to know where
         to find react / react-dom / jsx-runtime. esm.sh supplies them. -->
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18",
          "react/jsx-runtime": "https://esm.sh/react@18/jsx-runtime",
          "react-dom": "https://esm.sh/react-dom@18",
          "react-dom/client": "https://esm.sh/react-dom@18/client"
        }
      }
    </script>

    <!-- Styles are NOT auto-injected by the JS bundle — load them yourself. -->
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="root"></div>

    <script type="module">
      import { createRoot } from 'react-dom/client';
      import { jsx } from 'react/jsx-runtime';
      import { Button } from './index.js'; // the copied dist bundle

      createRoot(document.getElementById('root')).render(
        jsx('div', {
          style: { padding: 0, marginTop: 0, fontFamily: 'system-ui, sans-serif' },
          children: [
            jsx('h1', { children: 'MonoFly — dev preview', key: 'h1' }),
            jsx('p', { children: 'This is a simple dev preview for the MonoFly component library.', key: 'p1' }),
            jsx('p', { children: 'MonoFly is a collection of React components for building user interfaces.', key: 'p2' }),
            jsx('hr', { key: 'hr' }),
            jsx('p', { children: 'MonoFly components are designed to be flexible and customizable. You can use them as building blocks for your UI, and style them as needed.', key: 'p3' }),
            jsx('div', {
              style: { display: 'flex', flexWrap: 'wrap', columnGap: 16, rowGap: 16 },
              children: [
                jsx(Button, { variant: 'primary', children: 'Save', key: 'a' }),
                ' ',
                jsx(Button, { variant: 'secondary', children: 'Cancel', key: 'b' }),
                ' ',
                jsx(Button, { variant: 'danger', children: 'Delete', key: 'c' }),
                ' ',
                jsx(Button, { variant: 'success', children: 'Success', key: 'd' }),
                ' ',
                jsx(Button, { variant: 'warning', children: 'Warning', key: 'e' }),
              ],
              key: 'buttons',
            }),
          ],
        }),
      );
    </script>
  </body>
</html>
